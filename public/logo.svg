<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" stop-color="#0033bb"/>
      <stop offset="35%" stop-color="#0066ff"/>
      <stop offset="65%" stop-color="#0099ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#e0e4ec"/>
      <stop offset="65%" stop-color="#b8c0cc"/>
      <stop offset="100%" stop-color="#8892a4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Layer 1: Blue diagonal band (extends behind white right piece for interlocking) -->
  <path d="M 88,18 L 192,70 L 192,180 L 88,122 Z"
        fill="url(#blueGrad)" filter="url(#glow)"/>

  <!-- Layer 2: White diagonal band (extends behind blue left piece for interlocking) -->
  <path d="M 152,242 L 48,190 L 48,80 L 152,138 Z"
        fill="url(#silverGrad)"/>

  <!-- Layer 3: Blue left piece — arrow peak at top, interlocking notch on right, chevron notch at bottom-left -->
  <path d="M 88,18 L 88,78 L 60,110 L 88,148 L 88,218 L 38,218 L 58,193 L 38,168 L 38,75 Z"
        fill="url(#blueGrad)" filter="url(#glow)"/>

  <!-- Layer 4: White right piece — arrow peak at bottom, interlocking notch on left, chevron notch at top-right -->
  <path d="M 152,242 L 152,182 L 180,150 L 152,112 L 152,42 L 202,42 L 182,67 L 202,92 L 202,185 Z"
        fill="url(#silverGrad)"/>
</svg>
