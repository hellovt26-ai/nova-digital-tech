<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#0088ff" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#0055ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-core" cx="50%" cy="46%" r="20%" fx="50%" fy="46%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="30%" stop-color="#0088ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00c8ff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#0088ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Ambient glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow-core)"/>

  <!-- Subtle accent line above title -->
  <rect x="400" y="250" width="400" height="1" fill="url(#line-grad)" rx="0.5"/>

  <!-- NOVA DIGITAL TECH -->
  <text x="600" y="315" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="8" fill="#ffffff">NOVA DIGITAL TECH</text>

  <!-- Subtle accent line below title -->
  <rect x="400" y="340" width="400" height="1" fill="url(#line-grad)" rx="0.5"/>

  <!-- Tagline -->
  <text x="600" y="385" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="4" fill="#6b7280">Premium Digital Solutions</text>
</svg>
